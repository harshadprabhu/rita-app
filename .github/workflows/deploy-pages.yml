name: Deploy web to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Only one Pages deploy at a time; newer pushes supersede in-flight ones.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Load public Supabase anon key from committed migration
        run: |
          KEY=$(grep -oE 'Bearer eyJ[A-Za-z0-9_.-]+' supabase/migrations/20260702000000_gold_rate_broadcast_reads.sql | head -1 | sed 's/Bearer //')
          echo "EXPO_PUBLIC_SUPABASE_ANON_KEY=$KEY" >> "$GITHUB_ENV"

      - name: Build web export
        env:
          # Served under https://<user>.github.io/rita-app/
          PAGES_BASE_URL: /rita-app
          # Public Supabase project URL (safe to expose; anon key is protected by RLS).
          EXPO_PUBLIC_SUPABASE_URL: https://ftzczoiucqrirkcpzdyl.supabase.co
        run: npm run build:web

      - name: SPA fallback + disable Jekyll
        run: |
          # Deep links (e.g. /rita-app/tickets/123) 404 on Pages; fall back to
          # the SPA shell so Expo Router can handle the route client-side.
          cp dist/index.html dist/404.html
          # Stop Pages' Jekyll from stripping Expo's _expo/ asset folder.
          touch dist/.nojekyll

      - uses: actions/configure-pages@v5
        with:
          enablement: true

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
