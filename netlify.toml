[build]
  command = "npm run build:web"
  publish = "dist"

# Expo Router's static export produces per-route HTML files, but in-app
# navigation and deep links both need any unmatched path to fall back to a
# page that boots the client bundle, which then routes to the right screen.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
